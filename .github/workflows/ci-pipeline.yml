# ================================================================
# .github/workflows/ci-pipeline.yml
#
# This is the NORMAL CI pipeline for your backend service.
# When THIS fails, the cicd-agent.yml workflow kicks in
# automatically and analyzes + fixes the error.
# ================================================================

name: 🏗️ Backend CI Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8 mypy
      - run: flake8 . --max-line-length=120 --exclude=.venv
      - run: mypy agent/ --ignore-missing-imports

  # ── Unit Tests ───────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  # ── Security Scan ────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit safety
      - run: bandit -r agent/ -ll
      - run: safety check -r requirements.txt

  # ── Build ────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cicd-agent:${{ github.sha }} .
